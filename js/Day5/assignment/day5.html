const addEmployee = (id,name,department = "Developer",salary = 25000) => {
    return {id,name,department,salary
    };
};

const updateEmployee = (employee, updates) => {
    return {
        ...employee,
        ...updates
    };
};

const displayEmployee = (employee) => {
    const {id,name,department,salary,address} =employee;

    console.log(`Employee Details ID: ${id}
                                  Name: ${name}
                                  Department: ${department}
                                  Salary: ${salary}
                                  City: ${address?.city ?? "Not Available"}`);
};

const calculateSalary = (...employees) => {
    return employees.reduce((total, employee) => total + employee.salary,0);
};
